<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    .header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* CONTAINER */
    .container {
      padding: 15px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    /* CARD */
    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* TEXT */
    .card b {
      font-size: 16px;
    }

    small {
      opacity: 0.7;
    }

    /* BUTTONS */
    button {
      padding: 8px 12px;
      margin: 5px 5px 0 0;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .approve {
      background: #22c55e;
      color: white;
    }

    .approve:hover {
      background: #16a34a;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

    .delete:hover {
      background: #dc2626;
    }

    /* LINKS */
    a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 13px;
    }

    a:hover {
      text-decoration: underline;
    }

    /* SECTION */
    .section-title {
      margin: 20px 0 10px;
      font-size: 18px;
      font-weight: 600;
    }

    /* MOBILE */
    @media(max-width:500px) {
      .header {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="header">🛠️ Admin Dashboard</div>

  <div class="container">
<button onclick="goEarnings()" style="
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#f59e0b;
  color:black;
  font-weight:bold;
  border-radius:10px;
">
💰 View Earnings Dashboard
</button>
    <div class="section-title">🚖 All Bookings</div>
    <div id="bookings" class="grid"></div>

    <div class="section-title">👨‍✈️ Drivers</div>
    <div id="drivers" class="grid"></div>

 <div class="section-title">💸 Withdraw Requests</div>
<div id="withdrawList" class="grid"></div>

<h3 id="adminEarn">💰 Admin Earnings: ₹0</h3>

    

  </div>

  <script>
function goEarnings() {
  window.location.href = "/earnings.html";
}
    // ================= BOOKINGS =================
    function loadBookings() {

      fetch("/bookings", { credentials: "include" })
        .then(res => res.json())
        .then(data => {

          let html = "";

          if (!data.length) {
            html = "<p>No bookings</p>";
          }

         data.forEach(b => {

  let p, d;

  try {
    p = typeof b.pickup === "string" ? JSON.parse(b.pickup) : b.pickup;
    d = typeof b.drop === "string" ? JSON.parse(b.drop) : b.drop;
  } catch (e) {
    console.log("PARSE ERROR:", b);
    p = { lat: 0, lon: 0 };
    d = { lat: 0, lon: 0 };
  }

            html += `
      <div class="card">
        <b>${b.name}</b><br>
        <small>📍 ${p.lat.toFixed(3)}, ${p.lon.toFixed(3)}</small><br>
        <small>➡ ${d.lat.toFixed(3)}, ${d.lon.toFixed(3)}</small><br><br>

        <b>Status:</b> ${b.status}<br>
        <b>Driver:</b> ${b.driver || "Not assigned"}<br>
        <b>💰 Fare:</b> ₹${b.fare || 0}
      </div>
      `;
          });

          document.getElementById("bookings").innerHTML = html;

        })
        .catch(() => {
          document.getElementById("bookings").innerHTML = "Server error ❌";
        });

    }

    // ================= DRIVERS =================
    function loadDrivers() {

      fetch("/drivers", { credentials: "include" })
        .then(res => res.json())
        .then(data => {

          let html = "";

          if (!data.length) {
            html = "<p>No drivers</p>";
          }

       data.forEach(d => {

  html += `

  <div class="card">

    <b>${d.name}</b><br>

    📱 ${d.phone}<br><br>

    <b>🪪 Aadhar:</b> ${d.aadhar}<br>

    <b>💳 PAN:</b> ${d.pan}<br>

    <b>🚖 Vehicle:</b> ${d.vehicleNumber}<br>

    <b>🛂 License:</b> ${d.license}<br><br>


    <a href="/uploads/${d.aadharFile}" target="_blank">
      📄 View Aadhar
    </a><br>

    <a href="/uploads/${d.panFile}" target="_blank">
      📄 View PAN
    </a><br>

    <a href="/uploads/${d.rcFile}" target="_blank">
      🚖 View RC
    </a><br><br>


    <b>Status:</b>

    ${d.approved
      ? "✅ Approved"
      : "⏳ Pending"
    }

    <br><br>

    ${!d.approved ? `

    <button
      class="approve"
      onclick="approveDriver('${d._id}')"
    >
      Approve
    </button>

    ` : ""}

    <button
      class="delete"
      onclick="deleteDriver('${d._id}')"
    >
      Delete
    </button>

  </div>

  `;

});

          document.getElementById("drivers").innerHTML = html;

        })
        .catch(() => {
          document.getElementById("drivers").innerHTML = "Server error ❌";
        });

    }

    // ================= ACTIONS =================
    function approveDriver(id) {
      fetch("/approve-driver/" + id, {
        method: "POST",
        credentials: "include"
      })
        .then(() => {
          alert("Approved ✅");
          loadDrivers();
        });
    }

    function deleteDriver(id) {
      fetch("/delete-driver/" + id, {
        method: "POST",
        credentials: "include"
      })
        .then(() => {
          alert("Deleted ❌");
          loadDrivers();
        });
    }
function loadAdminEarnings() {
  fetch("/admin-earnings", { credentials: "include" })
    .then(res => res.json())
    .then(data => {

      document.getElementById("adminEarn").innerText =
        "💰 Admin Earnings: ₹" + (data.adminEarning || 0);

    })
    .catch(() => {
      document.getElementById("adminEarn").innerText =
        "💰 Admin Earnings: Error ❌";
    });
}

    // ================= AUTO LOAD =================
    loadBookings();
    loadDrivers();
    loadAdminEarnings();
    setInterval(loadAdminEarnings, 5000); 
    setInterval(loadBookings, 5000);
    setInterval(loadDrivers, 5000);
//load wdh fnc new//
function loadWithdraws() {

  fetch("/withdraw-requests", { credentials: "include" })
    .then(res => res.json())
    .then(data => {

      let html = "";

      if (!data.length) {
        html = "<p>No withdrawal requests</p>";
      }

      data.forEach(w => {

        html += `
          <div class="card">
            🚖 Driver: ${w.driverName || w.driver}<br>
            💰 Amount: ₹${w.amount}<br>
            📌 Status: ${w.status || "Pending"}<br><br>

            <button class="approve" onclick="approveWithdraw('${w._id}')">
              Approve
            </button>

            <button class="delete" onclick="rejectWithdraw('${w._id}')">
              Reject
            </button>

          </div>
        `;
      });

      document.getElementById("withdrawList").innerHTML = html;

    })
    .catch(() => {
      document.getElementById("withdrawList").innerHTML = "Server error ❌";
    });
}

function approveWithdraw(id) {
  fetch("/approve-withdraw/" + id, {
    method: "POST",
    credentials: "include"
  })
  .then(() => loadWithdraws());
}

function rejectWithdraw(id) {
  fetch("/reject-withdraw/" + id, {
    method: "POST",
    credentials: "include"
  })
  .then(() => loadWithdraws());
}

loadWithdraws();
setInterval(loadWithdraws, 5000);
  </script>

</body>

</html>
