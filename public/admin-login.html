<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  background: linear-gradient(135deg, #020617, #0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

/* CARD */
.container{
  width:100%;
  max-width:350px;
  background:#1e293b;
  padding:30px 25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  animation:fadeIn 0.8s ease;
}

/* TITLE */
h2{
  margin-bottom:20px;
  font-weight:600;
}

/* INPUT */
.input-group{
  position:relative;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#ef4444;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#dc2626;
  transform:scale(1.05);
}

/* BACK LINK */
.back{
  margin-top:15px;
  font-size:14px;
  color:#60a5fa;
  cursor:pointer;
}

.back:hover{
  text-decoration:underline;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:400px){
  .container{
    padding:25px 15px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🛠️ Admin Login</h2>

  <input type="text" id="username" placeholder="Admin Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="back" onclick="goHome()">⬅ Back to Home</div>
</div>

<script>

function login() {

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Enter all fields ⚠️");
    return;
  }

  fetch("/admin-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    credentials: "include",
    body: JSON.stringify({ username, password })
  })
  .then(res => res.json())
  .then(data => {

    if (data.success) {
      window.location.href = "admin.html";
    } else {
      alert("Wrong credentials ❌");
    }

  })
  .catch(() => {
    alert("Server error ❌");
  });

}

function goHome(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
