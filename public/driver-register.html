<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  linear-gradient(
    135deg,
    #0f172a,
    #111827,
    #1e293b
  );
  padding:20px;
}

.container{

  width:100%;
  max-width:420px;

  background:rgba(255,255,255,0.06);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.1);

  border-radius:25px;

  padding:28px;

  box-shadow:
  0 10px 40px rgba(0,0,0,0.4);

  color:white;
}

.logo{
  text-align:center;
  font-size:50px;
  margin-bottom:10px;
}

h2{
  text-align:center;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:#94a3b8;
  font-size:14px;
  margin-bottom:25px;
}

.input-group{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:13px;
  color:#cbd5e1;
}

input{

  width:100%;

  padding:13px;

  border:none;

  border-radius:12px;

  background:#0f172a;

  color:white;

  outline:none;

  font-size:14px;

  border:1px solid transparent;

  transition:0.3s;
}

input:focus{
  border:1px solid #22c55e;
}

input[type="file"]{
  padding:10px;
  cursor:pointer;
}

button{

  width:100%;

  padding:14px;

  border:none;

  border-radius:15px;

  background:linear-gradient(
    90deg,
    #22c55e,
    #16a34a
  );

  color:white;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;

  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

.note{
  margin-top:18px;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">🚖</div>

  <h2>Driver Registration</h2>

  <div class="sub">
    Join Auto Booking Platform
  </div>

  <div class="input-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter full name">
  </div>

  <div class="input-group">
    <label>Phone Number</label>
    <input type="text" id="phone" placeholder="Enter phone number">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create password">
  </div>

  <div class="input-group">
    <label>Aadhar Number</label>
    <input type="text" id="aadhar" placeholder="XXXX XXXX XXXX">
  </div>

  <div class="input-group">
    <label>PAN Number</label>
    <input type="text" id="pan" placeholder="ABCDE1234F">
  </div>

  <!-- NEW -->
  <div class="input-group">
    <label>Auto Registration Number</label>
    <input type="text"
    id="vehicleNumber"
    placeholder="RJ14 AB 1234">
  </div>

  <!-- NEW -->
  <div class="input-group">
    <label>Driving License Number</label>
    <input type="text"
    id="license"
    placeholder="Enter license number">
  </div>

  <div class="input-group">
    <label>Aadhar Photo</label>
    <input type="file"
    id="aadharFile"
    accept="image/*">
  </div>

  <div class="input-group">
    <label>PAN Photo</label>
    <input type="file"
    id="panFile"
    accept="image/*">
  </div>

  <!-- NEW -->
  <div class="input-group">
    <label>Auto RC Photo</label>
    <input type="file"
    id="rcFile"
    accept="image/*">
  </div>

  <button onclick="registerDriver()">
    Register Driver
  </button>

  <div class="note">
    Approval may take some time after verification.
  </div>

</div>

<script>

async function registerDriver(){

  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const password =
    document.getElementById("password").value;

  const aadhar =
    document.getElementById("aadhar").value;

  const pan =
    document.getElementById("pan").value;

  const vehicleNumber =
    document.getElementById("vehicleNumber").value;

  const license =
    document.getElementById("license").value;

  const aadharFile =
    document.getElementById("aadharFile").files[0];

  const panFile =
    document.getElementById("panFile").files[0];

  const rcFile =
    document.getElementById("rcFile").files[0];


  if(
    !name ||
    !phone ||
    !password ||
    !aadhar ||
    !pan ||
    !vehicleNumber ||
    !license
  ){
    alert("Fill all fields ❌");
    return;
  }

  if(
    !aadharFile ||
    !panFile ||
    !rcFile
  ){
    alert("Upload all documents ❌");
    return;
  }

  const formData = new FormData();

  formData.append("name", name);
  formData.append("phone", phone);
  formData.append("password", password);
  formData.append("aadhar", aadhar);
  formData.append("pan", pan);

  formData.append(
    "vehicleNumber",
    vehicleNumber
  );

  formData.append(
    "license",
    license
  );

  formData.append(
    "aadharFile",
    aadharFile
  );

  formData.append(
    "panFile",
    panFile
  );

  formData.append(
    "rcFile",
    rcFile
  );

  try{

    const res = await fetch(
      "/driver-register",
      {
        method:"POST",
        body:formData
      }
    );

    const data = await res.json();

    if(data.success){

      alert(
        "Registration Successful ✅"
      );

      window.location.href =
      "/driver-login.html";

    }else{

      alert(
        data.message ||
        "Registration Failed ❌"
      );

    }

  }catch(err){

    console.log(err);

    alert("Server Error ❌");

  }

}

</script>

</body>
</html>
